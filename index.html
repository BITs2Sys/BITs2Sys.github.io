<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="BITs2Sys, a CTF team from Beijing Institute of Technology." />
  <title>BITs2Sys</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="favicon32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    :root {
      --paper: #fbfcff;
      --ink: #111827;
      --muted: #64748b;
      --line: #d9e2f2;
      --blue: #2563ff;
      --blue-dark: #1738bd;
      --red: #ff315d;
      --red-dark: #b9183c;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(17, 24, 39, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        repeating-linear-gradient(90deg, rgba(37, 99, 255, 0.06) 0 1px, transparent 1px 86px),
        repeating-linear-gradient(0deg, rgba(255, 49, 93, 0.045) 0 1px, transparent 1px 86px),
        var(--paper);
    }

    #signal-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .home {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 42px 20px;
    }

    .home-core {
      width: min(920px, 100%);
      text-align: center;
    }

    .team-logo {
      width: clamp(68px, 11vw, 92px);
      height: clamp(68px, 11vw, 92px);
      margin: 0 auto 20px;
      display: block;
      border-radius: 50%;
      background: var(--white);
      object-fit: contain;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(4rem, 13vw, 9rem);
      line-height: 0.9;
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 8px 8px 0 rgba(37, 99, 255, 0.14);
    }

    .home-line {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 16px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--white);
      color: var(--red-dark);
      font-size: clamp(0.86rem, 2.2vw, 1rem);
      font-weight: 950;
      text-transform: uppercase;
      box-shadow: 5px 5px 0 var(--ink);
    }

    .jump-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 36px;
    }

    .jump-links a {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 5px 5px 0 var(--ink);
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 900;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .jump-links .ctftime-link {
      gap: 9px;
      padding-left: 12px;
    }

    .jump-links .ctftime-link img {
      width: 23px;
      height: 23px;
      display: block;
      padding: 3px;
      border-radius: 50%;
      background: var(--white);
    }

    .jump-links a.is-blue {
      background: var(--blue);
      color: var(--white);
    }

    .jump-links a.is-red {
      background: var(--red);
      color: var(--white);
    }

    .jump-links a:hover,
    .jump-links a:focus-visible {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 var(--ink);
      outline: none;
    }

    @media (max-width: 520px) {
      .jump-links {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <canvas id="signal-canvas" aria-hidden="true"></canvas>

  <main class="home">
    <div class="home-core">
      <img class="team-logo" src="BITs2Sys-logo.png" alt="BITs2Sys logo" />
      <h1>BITs2Sys</h1>
      <div class="home-line">A CTF Team from BIT</div>
      <nav class="jump-links" aria-label="Primary links">
        <a class="is-blue" href="members.html">Members</a>
        <a class="is-red" href="awards.html">Awards</a>
        <a href="vulnerabilities.html">Vulnerabilities</a>
        <a class="is-red" href="https://bitctf.cn/join" target="_blank" rel="noreferrer">Join us</a>
        <a class="ctftime-link is-blue" href="https://ctftime.org/team/8682" target="_blank" rel="noreferrer"><img src="ctftime-logo.svg" alt="" />CTFtime</a>
        <a href="https://community.bitctf.cn" target="_blank" rel="noreferrer">Community</a>
      </nav>
    </div>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("signal-canvas");
      const ctx = canvas.getContext("2d");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const colors = ["#2563ff", "#ff315d", "#111827"];
      const pointer = { x: -9999, y: -9999 };
      let width = 0;
      let height = 0;
      let nodes = [];

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const count = Math.max(36, Math.floor((width * height) / 22000));
        nodes = Array.from({ length: count }, (_, index) => ({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.34,
          vy: (Math.random() - 0.5) * 0.34,
          size: index % 7 === 0 ? 3.4 : 2.2,
          color: colors[index % colors.length]
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "rgba(251, 252, 255, 0.72)";
        ctx.fillRect(0, 0, width, height);

        for (let i = 0; i < nodes.length; i += 1) {
          const a = nodes[i];
          if (!reduceMotion) {
            const dx = a.x - pointer.x;
            const dy = a.y - pointer.y;
            const distance = Math.hypot(dx, dy);
            if (distance < 160) {
              a.vx += dx / 18000;
              a.vy += dy / 18000;
            }
            a.x += a.vx;
            a.y += a.vy;
            if (a.x < -20) a.x = width + 20;
            if (a.x > width + 20) a.x = -20;
            if (a.y < -20) a.y = height + 20;
            if (a.y > height + 20) a.y = -20;
          }

          for (let j = i + 1; j < nodes.length; j += 1) {
            const b = nodes[j];
            const d = Math.hypot(a.x - b.x, a.y - b.y);
            if (d < 132) {
              ctx.globalAlpha = (1 - d / 132) * 0.45;
              ctx.strokeStyle = i % 2 === 0 ? "#2563ff" : "#ff315d";
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }

          ctx.globalAlpha = 0.9;
          ctx.fillStyle = a.color;
          ctx.fillRect(a.x - a.size / 2, a.y - a.size / 2, a.size, a.size);
        }

        ctx.globalAlpha = 1;
        if (!reduceMotion) requestAnimationFrame(draw);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("pointermove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
      });
      window.addEventListener("pointerleave", () => {
        pointer.x = -9999;
        pointer.y = -9999;
      });
      resize();
      draw();
    })();
  </script>
</body>
</html>
